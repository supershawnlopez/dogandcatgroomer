<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Say It Client Editor</title>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f4f5f7;
}

/* HEADER */
#sayit-header{
position:fixed;
top:0;
left:0;
right:0;
z-index:9999;

background:#11100d;
color:#fff;

display:flex;
align-items:center;
justify-content:space-between;

padding:16px 20px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

#sayit-header img{
height:34px;
}

.sayit-right{
font-size:13px;
color:#ffffff;
text-align:right;
line-height:1.4;
}

.sayit-right a{
color:#ffffff;
text-decoration:none;
}

/* CENTER LOGIN AREA */
#app{
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding-top:120px;
}

/* MOBILE */
@media (max-width:768px){
#sayit-header{
flex-direction:column;
align-items:flex-start;
gap:6px;
}

#app{
padding-top:140px;
}
}
</style>
</head>

<body>

<div id="sayit-header">
<img src="./sayit-client-logo.png" alt="Say It Marketing"/>

<div class="sayit-right">
sayitmarketing.com<br/>
hello@sayitmarketing.com · (520) 222-6308
</div>
</div>

<div id="app"></div>

<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

</body>
</html>
