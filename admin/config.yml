backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "business_controls"
    label: "Business Controls"
    files:
      - label: "Services & Pricing"
        name: "services"
        file: "content/services.json"
        fields:
          - label: "Page Headline"
            name: "page_title"
            widget: "string"
            hint: "Main headline shown at the top of the services page."

          - label: "Dog Services"
            name: "dog_services"
            widget: "list"
            summary: "{{fields.name}}"
            hint: "Edit dog services and pricing only."
            fields:
              - { label: "Service Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Price", name: "price", widget: "string", required: false, hint: "Leave blank if you do not want pricing to show yet." }

          - label: "Cat Services"
            name: "cat_services"
            widget: "list"
            summary: "{{fields.name}}"
            hint: "Edit cat services and pricing only."
            fields:
              - { label: "Service Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Price", name: "price", widget: "string", required: false, hint: "Leave blank if you do not want pricing to show yet." }

          - label: "Add-On Services"
            name: "programs"
            widget: "list"
            summary: "{{fields.name}}"
            hint: "Edit add-on services and pricing only."
            fields:
              - { label: "Service Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Price", name: "price", widget: "string", required: false, hint: "Leave blank if you do not want pricing to show yet." }

      - label: "Business Hours"
        name: "hours"
        file: "content/contact.json"
        fields:
          - label: "Open From Day"
            name: "business_days_from"
            widget: "select"
            options: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"]

          - label: "Open To Day"
            name: "business_days_to"
            widget: "select"
            options: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"]

          - label: "Opening Time"
            name: "business_open"
            widget: "select"
            options:
              - "6:00 AM"
              - "6:30 AM"
              - "7:00 AM"
              - "7:30 AM"
              - "8:00 AM"
              - "8:30 AM"
              - "9:00 AM"
              - "9:30 AM"
              - "10:00 AM"
              - "10:30 AM"
              - "11:00 AM"
              - "11:30 AM"
              - "12:00 PM"
              - "12:30 PM"
              - "1:00 PM"
              - "1:30 PM"
              - "2:00 PM"
              - "2:30 PM"
              - "3:00 PM"
              - "3:30 PM"
              - "4:00 PM"
              - "4:30 PM"
              - "5:00 PM"
              - "5:30 PM"
              - "6:00 PM"

          - label: "Closing Time"
            name: "business_close"
            widget: "select"
            options:
              - "6:00 AM"
              - "6:30 AM"
              - "7:00 AM"
              - "7:30 AM"
              - "8:00 AM"
              - "8:30 AM"
              - "9:00 AM"
              - "9:30 AM"
              - "10:00 AM"
              - "10:30 AM"
              - "11:00 AM"
              - "11:30 AM"
              - "12:00 PM"
              - "12:30 PM"
              - "1:00 PM"
              - "1:30 PM"
              - "2:00 PM"
              - "2:30 PM"
              - "3:00 PM"
              - "3:30 PM"
              - "4:00 PM"
              - "4:30 PM"
              - "5:00 PM"
              - "5:30 PM"
              - "6:00 PM"

          - label: "Hours Preview"
            name: "phone_note"
            widget: "string"
            required: false
            hint: "This will update automatically when the day and time fields are filled in."
