
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Most Popular Grooming Services</h2>

<div class="carousel">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=600">
    <div class="card-body">
      <h3>Full Groom</h3>
      <button class="btn btn-outline" onclick="openModal('Full Groom')">Learn More</button>
      <button class="btn btn-primary">Book Now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1596854407944-bf87f6fdd49e?w=600">
    <div class="card-body">
      <h3>Bath & Brush</h3>
      <button class="btn btn-outline" onclick="openModal('Bath & Brush')">Learn More</button>
      <button class="btn btn-primary">Book Now</button>
    </div>
  </div>
</div>

<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="modal-title"></h3>
    <p>Service details go here.</p>
    <button class="btn btn-primary">Book This Service</button>
  </div>
</div>

<script>
function openModal(title){
  document.getElementById('modal').style.display='flex';
  document.getElementById('modal-title').innerText=title;
}
function closeModal(){
  document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
